<!DOCTYPE html>
<html lang="es" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAG Analyst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Settings overlay -->
<div id="settings-overlay" class="settings-overlay"></div>
<div id="settings-panel" class="settings-panel">
    <div class="settings-header">
        <h3>Configuracion</h3>
        <button class="icon-btn" id="btn-close-settings" title="Cerrar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <div class="settings-section">
        <h4>Apariencia</h4>
        <div class="theme-selector">
            <button class="theme-option" data-theme-val="light" title="Modo claro">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                Claro
            </button>
            <button class="theme-option" data-theme-val="dark" title="Modo oscuro">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                Oscuro
            </button>
            <button class="theme-option" data-theme-val="system" title="Seguir sistema">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Auto
            </button>
        </div>
    </div>

    <div class="settings-section">
        <h4>Fuentes de documentos</h4>
        <div id="collection-list"></div>
        <label class="toggle-switch" style="margin-top:12px">
            <input type="checkbox" id="toggle-sources" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">Mostrar fuentes en respuestas</span>
        </label>
    </div>
    <div class="settings-section">
        <h4>Acciones</h4>
        <button class="settings-btn danger" id="btn-clear-chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Limpiar chat
        </button>
        <button class="settings-btn" id="btn-export-chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar chat
        </button>
    </div>
    <div class="settings-footer">
        RAG Analyst &middot; Inteligencia documental<br>
        Potenciado por IA
    </div>
</div>

<!-- Main App -->
<div class="app-container">
    <header class="app-header">
        <div class="header-left">
            <span class="header-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3v18h18" stroke="var(--primary)"/>
                    <path d="M7 16l4-6 4 4 5-8" stroke="var(--accent)" stroke-width="2"/>
                    <circle cx="7" cy="16" r="1.5" fill="var(--accent)" stroke="none"/>
                    <circle cx="11" cy="10" r="1.5" fill="var(--accent)" stroke="none"/>
                    <circle cx="15" cy="14" r="1.5" fill="var(--accent)" stroke="none"/>
                    <circle cx="20" cy="6" r="1.5" fill="var(--accent)" stroke="none"/>
                </svg>
            </span>
            <span class="header-logo">RAG Analyst</span>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="btn-settings" title="Configuracion">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
            </button>
        </div>
    </header>

    <main id="chat-area" class="chat-area">
        <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-card">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
                        <path d="M7 16l4-6 4 4 5-8" stroke="white" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <h2>Bienvenido a RAG Analyst</h2>
                <p>Tu asistente de inteligencia para economia y finanzas.<br>
                Pregunta lo que necesites sobre tus documentos.</p>
            </div>
            <div id="suggested-questions" class="suggested-pills"></div>
        </div>
    </main>

    <footer class="input-bar">
        <div class="input-container">
            <textarea id="user-input" rows="1" placeholder="Hace tu pregunta sobre los documentos..." autocomplete="off"></textarea>
            <button id="btn-send" class="send-btn" disabled title="Enviar">
                <svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9z"/></svg>
            </button>
        </div>
    </footer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
